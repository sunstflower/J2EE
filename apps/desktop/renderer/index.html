<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mac-proxy-client</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "SF Pro Display", "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(73, 131, 255, 0.18), transparent 35%),
          linear-gradient(180deg, #f8fbff 0%, #edf3fb 100%);
        color: #132238;
      }

      main {
        width: min(720px, calc(100vw - 48px));
        padding: 40px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.85);
        box-shadow: 0 24px 60px rgba(30, 55, 90, 0.12);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 2rem;
      }

      p {
        margin: 0;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Desktop shell scaffold ready</h1>
      <p>
        Electron is initialized. Set <code>MAC_PROXY_RENDERER_URL</code> to a running web
        dev server during development, or replace this fallback file during packaging.
      </p>
    </main>
  </body>
</html>
